name: harden

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - id: mk
        shell: bash
        run: |
          MATRIX_JSON="$(python tools/scripts/make_matrix.py)"
          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  harden:
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6"

      - name: Cache Sky130 PDK
        uses: actions/cache@v4
        with:
          path: /home/runner/pdk
          key: ${{ runner.os }}-pdk-sky130-12df12e2e74145e31c5a13de02f9a1e176b56e67

      - name: Install Sky130 PDK (Volare CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          volare enable sky130 12df12e2e74145e31c5a13de02f9a1e176b56e67 --pdk-root /home/runner/pdk
          test -d /home/runner/pdk/sky130A || (echo "PDK not found at /home/runner/pdk/sky130A" && exit 1)

      - run: |
          python tools/scripts/gen_config.py --variant "${{ matrix.variant }}" --clock_ns "${{ matrix.clock_ns }}" --pdk-root "/home/runner/pdk" --out config.json

      - run: docker pull ghcr.io/efabless/openlane2:2.4.0.dev1

      - name: Run OpenLane2 (docker)
        run: docker run --rm -v "${GITHUB_WORKSPACE}:/work" -v "/home/runner/pdk:/pdk" -w /work ghcr.io/efabless/openlane2:2.4.0.dev1 bash -lc "python3 -m openlane --pdk-root /pdk config.json"

      - if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          OUT_DIR="docs/results/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${RUN_ID}"
          mkdir -p "$OUT_DIR"
          [ -d "runs" ] && cp -rv runs "$OUT_DIR/" || true
          python tools/scripts/extract_metrics.py . --out "$OUT_DIR" || true
          python tools/scripts/render_gds.py --run-root . --out "$OUT_DIR/renders" || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.variant }}-${{ matrix.clock_ns }}
          path: docs/

  assemble_pages:
    needs: harden
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          pattern: docs-*
          path: _docs_in
          merge-multiple: true

      - run: |
          rm -rf docs
          mkdir -p docs
          cp -rv _docs_in/* docs/ || true
          python tools/scripts/build_dashboard.py --mode full || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy_pages:
    needs: assemble_pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/deploy-pages@v4