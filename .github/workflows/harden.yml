name: harden

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PDK_NAME: sky130
  PDK_VERSION: 12df12e2e74145e31c5a13de02f9a1e176b56e67
  PDK_ROOT: /home/runner/pdk
  OPENLANE2_IMAGE: ghcr.io/efabless/openlane2:2.4.0.dev1

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6" "markdown"

      - id: mk
        name: Build matrix from manifest (safe output)
        shell: bash
        run: |
          MATRIX_JSON="$(MATRIX_CAP="${MATRIX_CAP:-}" python tools/scripts/make_matrix.py)"
          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  harden:
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install python deps + volare
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6" "markdown"

      - name: Cache Sky130 PDK
        uses: actions/cache@v4
        with:
          path: ${{ env.PDK_ROOT }}
          key: ${{ runner.os }}-pdk-${{ env.PDK_NAME }}-${{ env.PDK_VERSION }}

      - name: Install Sky130 PDK (Volare CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          volare enable --pdk "${PDK_NAME}" "${PDK_VERSION}" --pdk-root "${PDK_ROOT}"
          test -d "${PDK_ROOT}/sky130A" || (echo "PDK not found at ${PDK_ROOT}/sky130A" && exit 1)

      - name: Generate config.json
        run: |
          python tools/scripts/gen_config.py \
            --variant "${{ matrix.variant }}" \
            --clock_ns "${{ matrix.clock_ns }}" \
            --pdk-root "${PDK_ROOT}" \
            --out config.json

      - name: Pull OpenLane2 container
        run: docker pull "${OPENLANE2_IMAGE}"

      - name: Run OpenLane2 (docker)
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "${PDK_ROOT}:/pdk" \
            -w /work \
            "${OPENLANE2_IMAGE}" \
            bash -lc "python3 -m openlane --pdk-root /pdk config.json"

      - name: Find run directory (robust)
        id: findrun
        shell: bash
        run: |
          set -e

          if [ ! -d runs ]; then
            echo "No runs/ directory produced."
            echo "run_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Prefer newest folder containing final/metrics.json
          RUN_DIR="$(find runs -type f -path '*/final/metrics.json' -printf '%T@ %h\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [ -z "$RUN_DIR" ]; then
            echo "No runs/**/final/metrics.json found. Dumping run tree:"
            find runs -maxdepth 3 -type d || true
            echo "run_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected RUN_DIR=$RUN_DIR"
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"

      - name: Collect outputs into docs/
        if: always()
        shell: bash
        run: |
          RUN_ID="${{ github.run_id }}"
          OUT_DIR="docs/results/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${RUN_ID}"
          mkdir -p "$OUT_DIR"

          # Copy all runs for provenance
          if [ -d "runs" ]; then
            cp -rv runs "$OUT_DIR/" || true
          fi

          RUN_DIR="${{ steps.findrun.outputs.run_dir }}"
          echo "RUN_DIR used: ${RUN_DIR:-<none>}" > "$OUT_DIR/run_dir_used.txt"

          if [ -n "$RUN_DIR" ]; then
            # Primary extractor (your script)
            python tools/scripts/extract_metrics.py "$RUN_DIR" --out "$OUT_DIR" || true

            # Render from the same run dir for consistency
            python tools/scripts/render_gds.py --run-root "$RUN_DIR" --out "$OUT_DIR/renders" || true

            # Always stash raw metrics.json next to tables for debugging
            if [ -f "$RUN_DIR/final/metrics.json" ]; then
              cp -v "$RUN_DIR/final/metrics.json" "$OUT_DIR/metrics_raw.json" || true
            fi
          else
            echo "No RUN_DIR found; skipping metrics/render extraction" > "$OUT_DIR/provenance.txt"
          fi

          # Create per-run viewer html
          python - <<'PY'
          import os, glob
          out_dir = os.environ.get("OUT_DIR", "")
          renders = sorted(glob.glob(os.path.join(out_dir, "renders", "*.png")))
          html_path = os.path.join(out_dir, "viewer.html")
          with open(html_path, "w", encoding="utf-8") as f:
              f.write("<!doctype html><html><head><meta charset='utf-8'>"
                      "<meta name='viewport' content='width=device-width,initial-scale=1'>"
                      "<title>Layout Renders</title>"
                      "<style>body{font-family:system-ui;margin:24px;max-width:1100px}"
                      "img{max-width:100%;border:1px solid #ddd;margin:12px 0}</style>"
                      "</head><body><h1>Layout Renders</h1>")
              if not renders:
                  f.write("<p>No PNG renders found.</p>")
              for p in renders:
                  rel = os.path.relpath(p, out_dir).replace("\\","/")
                  f.write(f"<div><img src='{rel}' alt='{rel}'/></div>")
              f.write("<p>For interactive / 3D view, download the GDS from the artifact and open in KLayout.</p>")
              f.write("</body></html>")
          PY
        env:
          OUT_DIR: docs/results/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${{ github.run_id }}

      - name: Upload per-run docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.variant }}-${{ matrix.clock_ns }}
          path: docs/

      - name: Job Summary (per-run metrics + extra fields)
        if: always()
        shell: bash
        run: |
          RUN_ID="${{ github.run_id }}"
          OUT_DIR="docs/results/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${RUN_ID}"

          echo "## Run: ${{ matrix.variant }} @ ${{ matrix.clock_ns }} ns" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$OUT_DIR/run_dir_used.txt" ]; then
            echo "**$(cat "$OUT_DIR/run_dir_used.txt")**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "$OUT_DIR/metrics.md" ]; then
            cat "$OUT_DIR/metrics.md" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No metrics.md produced (flow may have failed before final/metrics.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Extra metrics table from metrics_raw.json (best-effort)
          if [ -f "$OUT_DIR/metrics_raw.json" ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          p = Path("docs/results")  # not used; we use env OUT_DIR
          out_dir = Path("${OUT_DIR}")
          raw = json.loads((out_dir / "metrics_raw.json").read_text(encoding="utf-8"))

          # Try several common OpenLane/OpenROAD metric keys (best effort)
          keys = [
              "timing__setup__ws", "timing__setup__tns",
              "timing__hold__ws", "timing__hold__tns",
              "design__instance_count",
              "design__area", "design__die__area", "design__core__area",
              "design__core__utilization",
              "ir__voltage_drop__worst", "ir__voltage_drop__avg",
              "drc__violations", "lvs__violations", "antenna__violations",
              "power__total", "power__internal", "power__switching", "power__leakage",
              "runtime__total",
          ]

          def get_any(k):
              return raw.get(k, None)

          rows = []
          for k in keys:
              v = get_any(k)
              if v is not None:
                  rows.append((k, v))

          if rows:
              print("### Extra metrics (raw metrics.json)")
              print("")
              print("| key | value |")
              print("|---|---:|")
              for k, v in rows:
                  print(f"| `{k}` | {v} |")
              print("")
          PY
          fi

          echo "- Artifact: docs-${{ matrix.variant }}-${{ matrix.clock_ns }}" >> "$GITHUB_STEP_SUMMARY"

  assemble_pages:
    needs: harden
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "markdown"

      - name: Download all per-run docs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docs-*
          path: _docs_in
          merge-multiple: true

      - name: Merge docs + build dashboard
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs
          cp -rv _docs_in/* docs/ || true
          python tools/scripts/build_dashboard.py --mode full || true
          touch docs/.nojekyll

          # Ensure landing page exists
          if [ -f docs/index.md ]; then
            python - <<'PY'
          from pathlib import Path
          import markdown
          md = Path("docs/index.md").read_text(encoding="utf-8")
          html_body = markdown.markdown(md, extensions=["tables","fenced_code"])
          Path("docs/index.html").write_text(
              "<!doctype html><html><head><meta charset='utf-8'>"
              "<meta name='viewport' content='width=device-width,initial-scale=1'>"
              "<title>ASIC Flow Dashboard</title></head>"
              "<body style='font-family:system-ui;margin:24px;max-width:1100px'>"
              f"{html_body}</body></html>",
              encoding="utf-8"
          )
          PY
          else
            echo "<!doctype html><html><body><h1>No dashboard yet</h1></body></html>" > docs/index.html
          fi

      - name: Upload Pages artifact (single)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy_pages:
    needs: assemble_pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/deploy-pages@v4