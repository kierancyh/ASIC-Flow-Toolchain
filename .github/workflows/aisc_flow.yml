name: ASIC Flow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      variant:
        description: "Safe variant name such as designs_rns_crt"
        required: false
        default: ""
        type: string
      min_clock_ns:
        description: "Minimum clock period in ns"
        required: false
        default: "0"
        type: string
      initial_step_ns:
        description: "Initial coarse sweep step in ns"
        required: false
        default: "20"
        type: string
      coarse_steps:
        description: "Number of coarse +/- step levels around the baseline"
        required: false
        default: "4"
        type: string
      tolerance_ns:
        description: "Final stop tolerance in ns"
        required: false
        default: "1"
        type: string
      synth_strategy:
        description: "Optional synthesis strategy override (leave blank to use variant/OpenLane defaults)"
        required: false
        default: ""
        type: string
      run_antenna_repair:
        description: "OpenLane RUN_ANTENNA_REPAIR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_heuristic_diode_insertion:
        description: "OpenLane RUN_HEURISTIC_DIODE_INSERTION"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_post_grt_design_repair:
        description: "OpenLane RUN_POST_GRT_DESIGN_REPAIR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_post_grt_resizer_timing:
        description: "OpenLane RUN_POST_GRT_RESIZER_TIMING"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      openlane_image:
        description: "Docker image for OpenLane2"
        required: false
        default: "ghcr.io/efabless/openlane2:2.4.0.dev1"
        type: string
      open_pdks_rev:
        description: "Volare open_pdks revision for sky130"
        required: false
        default: "cd1748bb197f9b7af62a54507de6624e30363943"
        type: string

concurrency:
  group: asic-flow-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      resolved_variant: ${{ steps.resolve.outputs.resolved_variant }}
      start_clock_ns: ${{ steps.start.outputs.start_clock_ns }}
      coarse_matrix_json: ${{ steps.coarse.outputs.coarse_matrix_json }}
      min_clock_ns: ${{ steps.sweep.outputs.min_clock_ns }}
      coarse_step_ns: ${{ steps.sweep.outputs.coarse_step_ns }}
      coarse_steps: ${{ steps.sweep.outputs.coarse_steps }}
      refine1_step_ns: ${{ steps.sweep.outputs.refine1_step_ns }}
      refine2_step_ns: ${{ steps.sweep.outputs.refine2_step_ns }}
      tolerance_ns: ${{ steps.sweep.outputs.tolerance_ns }}
      openlane_image: ${{ steps.tools.outputs.openlane_image }}
      open_pdks_rev: ${{ steps.tools.outputs.open_pdks_rev }}
      summary_antenna_repair: ${{ steps.summary_knobs.outputs.antenna_repair }}
      summary_heuristic_diode_insertion: ${{ steps.summary_knobs.outputs.heuristic_diode_insertion }}
      summary_post_grt_design_repair: ${{ steps.summary_knobs.outputs.post_grt_design_repair }}
      summary_post_grt_resizer_timing: ${{ steps.summary_knobs.outputs.post_grt_resizer_timing }}
      summary_synth_strategy: ${{ steps.summary_synth.outputs.summary_synth_strategy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install plan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Resolve variant
        id: resolve
        env:
          INPUT_VARIANT: ${{ github.event.inputs.variant }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          manifest = yaml.safe_load(Path("manifest.yaml").read_text(encoding="utf-8")) or {}
          experiments = manifest.get("experiments", []) or []

          requested = os.environ.get("INPUT_VARIANT", "").strip()
          resolved = ""

          if requested:
              for exp in experiments:
                  variant = str(exp.get("variant", "")).strip()
                  safe = variant.replace("/", "_")
                  if requested in (variant, safe):
                      resolved = safe
                      break
              if not resolved:
                  resolved = requested
          else:
              for exp in experiments:
                  if exp.get("enabled", True) and exp.get("variant"):
                      resolved = str(exp["variant"]).replace("/", "_")
                      break

          if not resolved:
              raise SystemExit("No enabled variant found in manifest.yaml")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"resolved_variant={resolved}", file=f)

          print(f"resolved_variant={resolved}")
          PY

      - name: Resolve tool versions
        id: tools
        env:
          INPUT_OPENLANE_IMAGE: ${{ github.event.inputs.openlane_image }}
          INPUT_OPEN_PDKS_REV: ${{ github.event.inputs.open_pdks_rev }}
        run: |
          OPENLANE_IMAGE="${INPUT_OPENLANE_IMAGE:-ghcr.io/efabless/openlane2:2.4.0.dev1}"
          OPEN_PDKS_REV="${INPUT_OPEN_PDKS_REV:-cd1748bb197f9b7af62a54507de6624e30363943}"

          {
            echo "openlane_image=${OPENLANE_IMAGE}"
            echo "open_pdks_rev=${OPEN_PDKS_REV}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve auto start clock from variant.yaml
        id: start
        env:
          RESOLVED_VARIANT: ${{ steps.resolve.outputs.resolved_variant }}
        run: |
          START_CLOCK_NS="$(python tools/scripts/read_start_clock.py --variant "${RESOLVED_VARIANT}")"
          echo "start_clock_ns=${START_CLOCK_NS}" >> "$GITHUB_OUTPUT"

      - name: Resolve synthesis strategy label
        id: summary_synth
        env:
          RESOLVED_VARIANT: ${{ steps.resolve.outputs.resolved_variant }}
          INPUT_SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          root = Path('.')
          resolved_variant = os.environ.get('RESOLVED_VARIANT', '').strip()
          input_synth = os.environ.get('INPUT_SYNTH_STRATEGY', '').strip()

          manifest = yaml.safe_load((root / 'manifest.yaml').read_text(encoding='utf-8')) or {}
          variant_path = None
          candidate = root / resolved_variant
          if candidate.is_dir() and (candidate / 'variant.yaml').exists():
              variant_path = candidate
          else:
              for exp in manifest.get('experiments', []) or []:
                  variant = str(exp.get('variant', '')).strip()
                  safe = variant.replace('/', '_')
                  if resolved_variant in (variant, safe):
                      path = root / variant
                      if path.is_dir() and (path / 'variant.yaml').exists():
                          variant_path = path
                          break

          variant_override = ''
          if variant_path is not None:
              cfg = yaml.safe_load((variant_path / 'variant.yaml').read_text(encoding='utf-8')) or {}
              variant_override = str(((cfg.get('ll_policy') or {}).get('synth_strategy') or '')).strip()

          if input_synth:
              label = f'{input_synth} (workflow override)'
          elif variant_override:
              label = f'{variant_override} (variant.yaml ll_policy.synth_strategy)'
          else:
              label = 'Default (not overridden)'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              print(f'summary_synth_strategy={label}', file=f)
          PY

      - name: Resolve sweep parameters
        id: sweep
        env:
          INPUT_MIN_CLOCK_NS: ${{ github.event.inputs.min_clock_ns }}
          INPUT_INITIAL_STEP_NS: ${{ github.event.inputs.initial_step_ns }}
          INPUT_COARSE_STEPS: ${{ github.event.inputs.coarse_steps }}
          INPUT_TOLERANCE_NS: ${{ github.event.inputs.tolerance_ns }}
        run: |
          python - <<'PY'
          import os

          min_clock = max(0.0, float(os.environ.get("INPUT_MIN_CLOCK_NS", "") or "0"))
          coarse_step = float(os.environ.get("INPUT_INITIAL_STEP_NS", "") or "20")
          coarse_steps = int(os.environ.get("INPUT_COARSE_STEPS", "") or "4")
          tolerance = float(os.environ.get("INPUT_TOLERANCE_NS", "") or "1")

          if coarse_step <= 0:
              raise SystemExit("initial_step_ns must be > 0")
          if coarse_steps < 0:
              raise SystemExit("coarse_steps must be >= 0")
          if tolerance <= 0:
              raise SystemExit("tolerance_ns must be > 0")

          refine1 = max(tolerance, coarse_step / 4.0)
          refine2 = tolerance

          def fmt(v: float) -> str:
              if float(v).is_integer():
                  return str(int(v))
              return str(round(v, 6))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"min_clock_ns={fmt(min_clock)}", file=f)
              print(f"coarse_step_ns={fmt(coarse_step)}", file=f)
              print(f"coarse_steps={coarse_steps}", file=f)
              print(f"refine1_step_ns={fmt(refine1)}", file=f)
              print(f"refine2_step_ns={fmt(refine2)}", file=f)
              print(f"tolerance_ns={fmt(tolerance)}", file=f)
          PY

      - name: Resolve coarse auto matrix
        id: coarse
        env:
          START_CLOCK_NS: ${{ steps.start.outputs.start_clock_ns }}
          MIN_CLOCK_NS: ${{ steps.sweep.outputs.min_clock_ns }}
          COARSE_STEP_NS: ${{ steps.sweep.outputs.coarse_step_ns }}
          COARSE_STEPS: ${{ steps.sweep.outputs.coarse_steps }}
        run: |
          COARSE_MATRIX_JSON="$(python tools/scripts/make_clock_matrix.py \
            --start-clock-ns "${START_CLOCK_NS}" \
            --min-clock-ns "${MIN_CLOCK_NS}" \
            --step-ns "${COARSE_STEP_NS}" \
            --coarse-steps "${COARSE_STEPS}")"

          echo "coarse_matrix_json=${COARSE_MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "${COARSE_MATRIX_JSON}"

      - name: Resolve summary knob labels
        id: summary_knobs
        env:
          INPUT_RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          INPUT_RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          INPUT_RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          INPUT_RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
        run: |
          to_label() {
            case "${1:-}" in
              true|TRUE|True) echo "enabled" ;;
              false|FALSE|False) echo "disabled" ;;
              *) echo "${1:-}" ;;
            esac
          }

          {
            echo "antenna_repair=$(to_label "${INPUT_RUN_ANTENNA_REPAIR:-true}")"
            echo "heuristic_diode_insertion=$(to_label "${INPUT_RUN_HEURISTIC_DIODE_INSERTION:-true}")"
            echo "post_grt_design_repair=$(to_label "${INPUT_RUN_POST_GRT_DESIGN_REPAIR:-true}")"
            echo "post_grt_resizer_timing=$(to_label "${INPUT_RUN_POST_GRT_RESIZER_TIMING:-false}")"
          } >> "$GITHUB_OUTPUT"

      - name: Write plan summary
        run: |
          {
            echo "## Plan"
            echo ""
            echo "- Variant: \`${{ steps.resolve.outputs.resolved_variant }}\`"
            echo "- Baseline clock_ns: \`${{ steps.start.outputs.start_clock_ns }}\`"
            echo "- Coarse step: \`${{ steps.sweep.outputs.coarse_step_ns }} ns\`"
            echo "- Initial Coarse Sweep: \`${{ steps.coarse.outputs.coarse_matrix_json }}\`"
            echo "- Tolerance: \`${{ steps.sweep.outputs.tolerance_ns }} ns\`"
            echo "- Minimum Clock Floor: \`${{ steps.sweep.outputs.min_clock_ns }} ns\`"
            echo "- Synthesis strategy: \`${{ steps.summary_synth.outputs.summary_synth_strategy }}\`"
            echo "- Antenna repair: \`${{ steps.summary_knobs.outputs.antenna_repair }}\`"
            echo "- Heuristic diode insertion: \`${{ steps.summary_knobs.outputs.heuristic_diode_insertion }}\`"
            echo "- Post-GRT design repair: \`${{ steps.summary_knobs.outputs.post_grt_design_repair }}\`"
            echo "- Post-GRT resizer timing: \`${{ steps.summary_knobs.outputs.post_grt_resizer_timing }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  coarse-sweep:
    name: Coarse Sweep (${{ matrix.clock_ns }} ns)
    needs: plan
    if: ${{ needs.plan.outputs.coarse_matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        clock_ns: ${{ fromJson(needs.plan.outputs.coarse_matrix_json) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run coarse sweep point
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Enrich coarse artifact bundle
        if: always()
        shell: bash
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
        run: |
          set -euo pipefail
          BASE_DIR="ci_out/${VARIANT}"
          ATTEMPT_DIR="$(find "${BASE_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'clk_*ns_*' | head -n 1 || true)"

          if [ -z "${ATTEMPT_DIR}" ]; then
            echo "No attempt directory found under ${BASE_DIR}"
            exit 0
          fi

          RUN_DIR=""
          if [ -f "${ATTEMPT_DIR}/run_dir_used.txt" ]; then
            RUN_DIR="$(head -n 1 "${ATTEMPT_DIR}/run_dir_used.txt" | tr -d '\r' || true)"
          fi

          if [ -n "${RUN_DIR}" ] && [ -d "${RUN_DIR}" ]; then
            mkdir -p "${ATTEMPT_DIR}/openlane_run"
            cp -rv "${RUN_DIR}/." "${ATTEMPT_DIR}/openlane_run/" || true

            if [ -f "${RUN_DIR}/final/metrics.json" ] && [ ! -f "${ATTEMPT_DIR}/metrics_raw.json" ]; then
              cp -v "${RUN_DIR}/final/metrics.json" "${ATTEMPT_DIR}/metrics_raw.json" || true
            fi

            if [ -d "${RUN_DIR}/final/gds" ]; then
              mkdir -p "${ATTEMPT_DIR}/final/gds"
              cp -rv "${RUN_DIR}/final/gds/." "${ATTEMPT_DIR}/final/gds/" || true
            fi

            python tools/scripts/render_gds.py --run-root "${RUN_DIR}" --out "${ATTEMPT_DIR}/renders" || true
          fi

          python tools/scripts/build_layout_viewer.py --out-dir "${ATTEMPT_DIR}" || true

          if [ -f "${ATTEMPT_DIR}/viewer.html" ] && [ ! -f "${ATTEMPT_DIR}/index.html" ]; then
            cp -v "${ATTEMPT_DIR}/viewer.html" "${ATTEMPT_DIR}/index.html"
          fi

      - name: Upload coarse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coarse-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  select-refine-1:
    needs:
      - plan
      - coarse-sweep
    if: ${{ always() && needs.coarse-sweep.result != 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.select.outputs.matrix_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download coarse artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Select refine-1 matrix
        id: select
        run: |
          python tools/scripts/select_refine_matrix.py \
            --artifacts-root downloaded_artifacts \
            --expand-step-ns "${{ needs.plan.outputs.coarse_step_ns }}" \
            --refine-step-ns "${{ needs.plan.outputs.refine1_step_ns }}" \
            --min-clock-ns "${{ needs.plan.outputs.min_clock_ns }}" \
            --tolerance-ns "${{ needs.plan.outputs.tolerance_ns }}" \
            --batch-size 4 \
            --github-output "$GITHUB_OUTPUT"

  refine-sweep-1:
    name: Refine Sweep 1 (${{ matrix.clock_ns }} ns)
    needs:
      - plan
      - select-refine-1
    if: ${{ needs.select-refine-1.outputs.matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        clock_ns: ${{ fromJson(needs.select-refine-1.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run refine sweep point 1
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Enrich refine-1 artifact bundle
        if: always()
        shell: bash
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
        run: |
          set -euo pipefail
          BASE_DIR="ci_out/${VARIANT}"
          ATTEMPT_DIR="$(find "${BASE_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'clk_*ns_*' | head -n 1 || true)"

          if [ -z "${ATTEMPT_DIR}" ]; then
            echo "No attempt directory found under ${BASE_DIR}"
            exit 0
          fi

          RUN_DIR=""
          if [ -f "${ATTEMPT_DIR}/run_dir_used.txt" ]; then
            RUN_DIR="$(head -n 1 "${ATTEMPT_DIR}/run_dir_used.txt" | tr -d '\r' || true)"
          fi

          if [ -n "${RUN_DIR}" ] && [ -d "${RUN_DIR}" ]; then
            mkdir -p "${ATTEMPT_DIR}/openlane_run"
            cp -rv "${RUN_DIR}/." "${ATTEMPT_DIR}/openlane_run/" || true

            if [ -f "${RUN_DIR}/final/metrics.json" ] && [ ! -f "${ATTEMPT_DIR}/metrics_raw.json" ]; then
              cp -v "${RUN_DIR}/final/metrics.json" "${ATTEMPT_DIR}/metrics_raw.json" || true
            fi

            if [ -d "${RUN_DIR}/final/gds" ]; then
              mkdir -p "${ATTEMPT_DIR}/final/gds"
              cp -rv "${RUN_DIR}/final/gds/." "${ATTEMPT_DIR}/final/gds/" || true
            fi

            python tools/scripts/render_gds.py --run-root "${RUN_DIR}" --out "${ATTEMPT_DIR}/renders" || true
          fi

          python tools/scripts/build_layout_viewer.py --out-dir "${ATTEMPT_DIR}" || true

          if [ -f "${ATTEMPT_DIR}/viewer.html" ] && [ ! -f "${ATTEMPT_DIR}/index.html" ]; then
            cp -v "${ATTEMPT_DIR}/viewer.html" "${ATTEMPT_DIR}/index.html"
          fi

      - name: Upload refine-1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine1-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  select-refine-2:
    needs:
      - plan
      - coarse-sweep
      - refine-sweep-1
    if: ${{ always() && needs.refine-sweep-1.result != 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.select.outputs.matrix_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download accumulated artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Select refine-2 matrix
        id: select
        run: |
          python tools/scripts/select_refine_matrix.py \
            --artifacts-root downloaded_artifacts \
            --expand-step-ns "${{ needs.plan.outputs.refine1_step_ns }}" \
            --refine-step-ns "${{ needs.plan.outputs.refine2_step_ns }}" \
            --min-clock-ns "${{ needs.plan.outputs.min_clock_ns }}" \
            --tolerance-ns "${{ needs.plan.outputs.tolerance_ns }}" \
            --batch-size 6 \
            --github-output "$GITHUB_OUTPUT"

  refine-sweep-2:
    name: Refine Sweep 2 (${{ matrix.clock_ns }} ns)
    needs:
      - plan
      - select-refine-2
    if: ${{ needs.select-refine-2.outputs.matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        clock_ns: ${{ fromJson(needs.select-refine-2.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run refine sweep point 2
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Enrich refine-2 artifact bundle
        if: always()
        shell: bash
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
        run: |
          set -euo pipefail
          BASE_DIR="ci_out/${VARIANT}"
          ATTEMPT_DIR="$(find "${BASE_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'clk_*ns_*' | head -n 1 || true)"

          if [ -z "${ATTEMPT_DIR}" ]; then
            echo "No attempt directory found under ${BASE_DIR}"
            exit 0
          fi

          RUN_DIR=""
          if [ -f "${ATTEMPT_DIR}/run_dir_used.txt" ]; then
            RUN_DIR="$(head -n 1 "${ATTEMPT_DIR}/run_dir_used.txt" | tr -d '\r' || true)"
          fi

          if [ -n "${RUN_DIR}" ] && [ -d "${RUN_DIR}" ]; then
            mkdir -p "${ATTEMPT_DIR}/openlane_run"
            cp -rv "${RUN_DIR}/." "${ATTEMPT_DIR}/openlane_run/" || true

            if [ -f "${RUN_DIR}/final/metrics.json" ] && [ ! -f "${ATTEMPT_DIR}/metrics_raw.json" ]; then
              cp -v "${RUN_DIR}/final/metrics.json" "${ATTEMPT_DIR}/metrics_raw.json" || true
            fi

            if [ -d "${RUN_DIR}/final/gds" ]; then
              mkdir -p "${ATTEMPT_DIR}/final/gds"
              cp -rv "${RUN_DIR}/final/gds/." "${ATTEMPT_DIR}/final/gds/" || true
            fi

            python tools/scripts/render_gds.py --run-root "${RUN_DIR}" --out "${ATTEMPT_DIR}/renders" || true
          fi

          python tools/scripts/build_layout_viewer.py --out-dir "${ATTEMPT_DIR}" || true

          if [ -f "${ATTEMPT_DIR}/viewer.html" ] && [ ! -f "${ATTEMPT_DIR}/index.html" ]; then
            cp -v "${ATTEMPT_DIR}/viewer.html" "${ATTEMPT_DIR}/index.html"
          fi

      - name: Upload refine-2 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine2-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  compare-runs:
    name: Compare Runs
    needs:
      - plan
      - coarse-sweep
      - refine-sweep-1
      - refine-sweep-2
    if: ${{ always() && needs.coarse-sweep.result != 'skipped' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all upstream artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Show downloaded structure
        run: |
          find downloaded_artifacts -maxdepth 8 -type f | sort | sed -n '1,400p'

      - name: Fail if no metrics were downloaded
        run: |
          COUNT="$(find downloaded_artifacts -type f -name metrics.csv | wc -l | tr -d ' ')"
          echo "Found ${COUNT} metrics.csv files"
          test "${COUNT}" != "0"

      - name: Compare runs and build explorer
        run: |
          python tools/scripts/compare_runs.py \
            --artifacts-root downloaded_artifacts \
            --summary-md _compare_summary.md \
            --summary-csv _compare_summary.csv \
            --best-json _best_run.json \
            --best-bundle-dir best-layout-bundle \
            --site-dir _site \
            --repo-slug "${{ github.repository }}" \
            --run-id "${{ github.run_id }}"

      - name: Validate explorer outputs
        run: |
          test -f _compare_summary.md
          test -f _best_run.json
          test -f _site/index.html
          find _site -maxdepth 4 -type f | sort | sed -n '1,300p'

      - name: Append compare summary
        if: always()
        run: |
          cat _compare_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compare summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compare-summary
          path: |
            _compare_summary.md
            _compare_summary.csv
            _best_run.json
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload best-layout bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: best-layout-bundle
          path: best-layout-bundle/
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload run explorer site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-explorer-site
          path: _site/
          if-no-files-found: error
          include-hidden-files: true

  deploy-run-explorer:
    name: Deploy Run Explorer
    needs: compare-runs
    if: ${{ needs.compare-runs.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Download run explorer artifact
        uses: actions/download-artifact@v4
        with:
          name: run-explorer-site
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Workflow Summary
        run: |
          {
            echo "## Published Run Explorer"
            echo ""
            echo "- [Open ASIC Flow Run Explorer](${{ steps.deployment.outputs.page_url }})"
          } >> "$GITHUB_STEP_SUMMARY"