name: ASIC Flow

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      search_mode:
        description: "Sweep mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - fixed

      variant:
        description: "Optional safe variant name, e.g. designs_rns_crt"
        required: false
        default: ""
        type: string

      clock_list:
        description: "Fixed mode only: comma-separated sweep, e.g. 150,101,60,40,30,20,17"
        required: false
        default: ""
        type: string

      matrix_cap:
        description: "Fixed mode only: optional cap on number of sweep points"
        required: false
        default: ""
        type: number

      start_clock_ns:
        description: "Auto mode: starting clock period in ns"
        required: false
        default: ""
        type: string

      min_clock_ns:
        description: "Auto mode: minimum clock period in ns"
        required: false
        default: "5"
        type: string

      max_clock_ns:
        description: "Auto mode: maximum clock period in ns"
        required: false
        default: "200"
        type: string

      initial_step_ns:
        description: "Auto mode: initial search step in ns"
        required: false
        default: "20"
        type: string

      tolerance_ns:
        description: "Auto mode: stop when pass/fail interval is <= this value"
        required: false
        default: "1"
        type: string

      max_iters:
        description: "Auto mode: maximum number of attempts"
        required: false
        default: "8"
        type: number

      synth_strategy:
        description: "Synthesis strategy"
        required: false
        default: "AREA 3"
        type: choice
        options:
          - AREA 0
          - AREA 1
          - AREA 2
          - AREA 3
          - DELAY 0
          - DELAY 1
          - DELAY 2
          - DELAY 3

      run_antenna_repair:
        description: "Enable antenna repair"
        required: false
        default: true
        type: boolean

      run_heuristic_diode_insertion:
        description: "Enable heuristic diode insertion"
        required: false
        default: true
        type: boolean

      run_post_grt_design_repair:
        description: "Enable post-GRT design repair"
        required: false
        default: true
        type: boolean

      run_post_grt_resizer_timing:
        description: "Enable post-GRT resizer timing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PDK_NAME: sky130
  PDK_VERSION: 12df12e2e74145e31c5a13de02f9a1e176b56e67
  PDK_ROOT: /home/runner/pdk
  OPENLANE2_IMAGE: ghcr.io/efabless/openlane2:2.4.0.dev1
  PYTHON_VERSION: "3.11"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      resolved_variant: ${{ steps.mk.outputs.resolved_variant }}
      effective_mode: ${{ steps.mk.outputs.effective_mode }}
      resolved_start_clock_ns: ${{ steps.mk.outputs.resolved_start_clock_ns }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6" "pandas" "pyyaml"

      - name: Build plan
        id: mk
        shell: bash
        env:
          INPUT_SEARCH_MODE: ${{ inputs.search_mode }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_CLOCK_LIST: ${{ inputs.clock_list }}
          INPUT_MATRIX_CAP: ${{ inputs.matrix_cap }}
          INPUT_START_CLOCK_NS: ${{ inputs.start_clock_ns }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            EFFECTIVE_MODE="${INPUT_SEARCH_MODE:-auto}"
          else
            EFFECTIVE_MODE="auto"
          fi

          RESOLVED_VARIANT="${INPUT_VARIANT}"
          if [ -z "${RESOLVED_VARIANT}" ]; then
            RESOLVED_VARIANT="$(python - <<'PY'
          import yaml
          with open("manifest.yaml", "r", encoding="utf-8") as f:
              d = yaml.safe_load(f)
          ex = [e["variant"].replace("/", "_") for e in d.get("experiments", []) if e.get("enabled", True)]
          print(ex[0] if ex else "")
          PY
          )"
                    fi

                    if [ -z "${RESOLVED_VARIANT}" ]; then
                      echo "ERROR: no enabled variant found in manifest.yaml"
                      exit 1
                    fi

                    if [ "${EFFECTIVE_MODE}" = "auto" ]; then
                      RESOLVED_START_CLOCK_NS="${INPUT_START_CLOCK_NS}"
                      if [ -z "${RESOLVED_START_CLOCK_NS}" ]; then
                        RESOLVED_START_CLOCK_NS="$(python tools/scripts/read_start_clock.py --variant "${RESOLVED_VARIANT}")"
                      fi

                      MATRIX_JSON="$(python -c 'import json,sys; print(json.dumps([{"variant": sys.argv[1], "clock_ns": float(sys.argv[2])}]))' "${RESOLVED_VARIANT}" "${RESOLVED_START_CLOCK_NS}")"
                    else
                      RESOLVED_START_CLOCK_NS=""
                      ARGS=()
                      if [ -n "${RESOLVED_VARIANT}" ]; then
                        ARGS+=(--variant "${RESOLVED_VARIANT}")
                      fi
                      if [ -n "${INPUT_CLOCK_LIST}" ]; then
                        ARGS+=(--clock-list "${INPUT_CLOCK_LIST}")
                      fi
                      if [ -n "${INPUT_MATRIX_CAP}" ]; then
                        ARGS+=(--matrix-cap "${INPUT_MATRIX_CAP}")
                      fi
                      MATRIX_JSON="$(python tools/scripts/make_matrix.py "${ARGS[@]}")"
                    fi

                    echo "Resolved variant: ${RESOLVED_VARIANT}"
                    echo "Effective mode: ${EFFECTIVE_MODE}"
                    echo "Matrix JSON: ${MATRIX_JSON}"

                    python -c 'import json,sys; d=json.loads(sys.argv[1]); assert isinstance(d,list) and len(d)>0, "ERROR: matrix is empty"; print(f"Validated matrix entries: {len(d)}")' "${MATRIX_JSON}"

                    {
                      echo 'matrix<<EOF'
                      echo "${MATRIX_JSON}"
                      echo 'EOF'
                      echo "resolved_variant=${RESOLVED_VARIANT}"
                      echo "effective_mode=${EFFECTIVE_MODE}"
                      echo "resolved_start_clock_ns=${RESOLVED_START_CLOCK_NS}"
                    } >> "$GITHUB_OUTPUT"

      - name: Plan Summary
        if: always()
        shell: bash
        env:
          EFFECTIVE_MODE: ${{ steps.mk.outputs.effective_mode }}
          RESOLVED_VARIANT: ${{ steps.mk.outputs.resolved_variant }}
          RESOLVED_START_CLOCK_NS: ${{ steps.mk.outputs.resolved_start_clock_ns }}
          INPUT_CLOCK_LIST: ${{ inputs.clock_list }}
          INPUT_MATRIX_CAP: ${{ inputs.matrix_cap }}
          INPUT_MIN_CLOCK_NS: ${{ inputs.min_clock_ns }}
          INPUT_MAX_CLOCK_NS: ${{ inputs.max_clock_ns }}
          INPUT_INITIAL_STEP_NS: ${{ inputs.initial_step_ns }}
          INPUT_TOLERANCE_NS: ${{ inputs.tolerance_ns }}
          INPUT_MAX_ITERS: ${{ inputs.max_iters }}
        run: |
          echo "# Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Effective search mode: \`${EFFECTIVE_MODE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Variant: \`${RESOLVED_VARIANT}\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "${EFFECTIVE_MODE}" = "auto" ]; then
            echo "- Start clock: \`${RESOLVED_START_CLOCK_NS}\` ns" >> "$GITHUB_STEP_SUMMARY"
            echo "- Min clock: \`${INPUT_MIN_CLOCK_NS:-5}\` ns" >> "$GITHUB_STEP_SUMMARY"
            echo "- Max clock: \`${INPUT_MAX_CLOCK_NS:-200}\` ns" >> "$GITHUB_STEP_SUMMARY"
            echo "- Initial step: \`${INPUT_INITIAL_STEP_NS:-20}\` ns" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tolerance: \`${INPUT_TOLERANCE_NS:-1}\` ns" >> "$GITHUB_STEP_SUMMARY"
            echo "- Max iterations: \`${INPUT_MAX_ITERS:-8}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Clock list: \`${INPUT_CLOCK_LIST:-<from variant.yaml>}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Matrix cap: \`${INPUT_MATRIX_CAP:-<none>}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  run-flow:
    name: Run-Flow (${{ matrix.variant }}, ${{ matrix.clock_ns }} ns)
    if: ${{ needs.plan.outputs.effective_mode == 'fixed' }}
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install python deps + volare
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6" "pandas" "pyyaml"

      - name: Cache Sky130 PDK
        uses: actions/cache@v4
        with:
          path: ${{ env.PDK_ROOT }}
          key: ${{ runner.os }}-pdk-${{ env.PDK_NAME }}-${{ env.PDK_VERSION }}

      - name: Install Sky130 PDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          volare enable --pdk "${PDK_NAME}" "${PDK_VERSION}" --pdk-root "${PDK_ROOT}"
          test -d "${PDK_ROOT}/sky130A" || (echo "PDK not found at ${PDK_ROOT}/sky130A" && exit 1)

      - name: Generate config.json
        env:
          INPUT_SYNTH_STRATEGY: ${{ inputs.synth_strategy }}
          INPUT_RUN_ANTENNA_REPAIR: ${{ inputs.run_antenna_repair }}
          INPUT_RUN_HEURISTIC_DIODE_INSERTION: ${{ inputs.run_heuristic_diode_insertion }}
          INPUT_RUN_POST_GRT_DESIGN_REPAIR: ${{ inputs.run_post_grt_design_repair }}
          INPUT_RUN_POST_GRT_RESIZER_TIMING: ${{ inputs.run_post_grt_resizer_timing }}
        run: |
          set -euo pipefail

          SYNTH_STRATEGY="${INPUT_SYNTH_STRATEGY:-AREA 3}"
          RUN_ANTENNA_REPAIR="${INPUT_RUN_ANTENNA_REPAIR:-true}"
          RUN_HEURISTIC_DIODE_INSERTION="${INPUT_RUN_HEURISTIC_DIODE_INSERTION:-true}"
          RUN_POST_GRT_DESIGN_REPAIR="${INPUT_RUN_POST_GRT_DESIGN_REPAIR:-true}"
          RUN_POST_GRT_RESIZER_TIMING="${INPUT_RUN_POST_GRT_RESIZER_TIMING:-false}"

          python tools/scripts/gen_config.py \
            --variant "${{ matrix.variant }}" \
            --clock_ns "${{ matrix.clock_ns }}" \
            --pdk-root "${PDK_ROOT}" \
            --synth-strategy "${SYNTH_STRATEGY}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING}" \
            --out config.json

      - name: Pull OpenLane2 container
        run: docker pull "${OPENLANE2_IMAGE}"

      - name: Run OpenLane2
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "${PDK_ROOT}:/pdk" \
            -w /work \
            "${OPENLANE2_IMAGE}" \
            bash -lc "python3 -m openlane --pdk-root /pdk config.json"

      - name: Find run directory
        id: findrun
        shell: bash
        run: |
          set -e

          FINAL_DIR="$(find runs -type f -path '*/final/metrics.json' -printf '%T@ %h\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [ -z "${FINAL_DIR}" ]; then
            echo "No runs/**/final/metrics.json found."
            echo "run_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_DIR="$(dirname "${FINAL_DIR}")"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Collect outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ github.run_id }}"
          OUT_DIR="ci_out/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${RUN_ID}"
          mkdir -p "${OUT_DIR}"

          cat > "${OUT_DIR}/run_meta.json" <<EOF
          {
            "variant": "${{ matrix.variant }}",
            "clock_ns_requested": "${{ matrix.clock_ns }}",
            "github_run_id": "${{ github.run_id }}",
            "artifact_name": "run-${{ matrix.variant }}-${{ matrix.clock_ns }}"
          }
          EOF

          RUN_DIR="${{ steps.findrun.outputs.run_dir }}"
          echo "RUN_DIR used: ${RUN_DIR:-<none>}" > "${OUT_DIR}/run_dir_used.txt"

          if [ -n "${RUN_DIR}" ]; then
            python tools/scripts/extract_metrics.py "${RUN_DIR}" --out "${OUT_DIR}" --clock-ns "${{ matrix.clock_ns }}" || true
            python tools/scripts/render_gds.py --run-root "${RUN_DIR}" --out "${OUT_DIR}/renders" || true
            python tools/scripts/build_layout_viewer.py --out-dir "${OUT_DIR}" || true

            if [ -f "${RUN_DIR}/final/metrics.json" ]; then
              cp -v "${RUN_DIR}/final/metrics.json" "${OUT_DIR}/metrics_raw.json" || true
            fi

            if [ -d "${RUN_DIR}/final/gds" ]; then
              mkdir -p "${OUT_DIR}/final/gds"
              cp -rv "${RUN_DIR}/final/gds/." "${OUT_DIR}/final/gds/" || true
            fi
          fi

      - name: Upload per-run artifact
        if: always()
        id: upload_run_artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ matrix.variant }}-${{ matrix.clock_ns }}
          path: ci_out/
          if-no-files-found: error

      - name: Job Summary
        if: always()
        shell: bash
        env:
          OUT_DIR: ci_out/${{ matrix.variant }}/clk_${{ matrix.clock_ns }}ns_${{ github.run_id }}
          ARTIFACT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload_run_artifact.outputs.artifact-id }}
        run: |
          echo "## Run: ${{ matrix.variant }} @ ${{ matrix.clock_ns }} ns" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$OUT_DIR/metrics.csv" ]; then
            header="$(head -n 1 "$OUT_DIR/metrics.csv")"
            row="$(sed -n '2p' "$OUT_DIR/metrics.csv")"

            IFS=',' read -r -a headers <<< "$header"
            IFS=',' read -r -a values <<< "$row"

            declare -A M=()
            for i in "${!headers[@]}"; do
              key="${headers[$i]}"
              val=""
              if [ "$i" -lt "${#values[@]}" ]; then
                val="${values[$i]}"
              fi
              M["$key"]="$val"
            done

            echo "### Timing" >> "$GITHUB_STEP_SUMMARY"
            echo "| metric | value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| clock_ns | ${M[clock_ns]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| clock_ns_reported | ${M[clock_ns_reported]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| setup_wns_ns | ${M[setup_wns_ns]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| setup_tns_ns | ${M[setup_tns_ns]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| hold_wns_ns | ${M[hold_wns_ns]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| hold_tns_ns | ${M[hold_tns_ns]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| status | ${M[status]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "### Area and power" >> "$GITHUB_STEP_SUMMARY"
            echo "| metric | value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| core_area_um2 | ${M[core_area_um2]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| die_area_um2 | ${M[die_area_um2]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| instance_count | ${M[instance_count]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| utilization_pct | ${M[utilization_pct]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| wire_length_um | ${M[wire_length_um]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| vias_count | ${M[vias_count]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| power_total_W | ${M[power_total_W]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| power_internal_W | ${M[power_internal_W]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| power_switching_W | ${M[power_switching_W]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| power_leakage_W | ${M[power_leakage_W]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| power_source | ${M[power_source]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "### Signoff and physical" >> "$GITHUB_STEP_SUMMARY"
            echo "| metric | value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| drc_errors | ${M[drc_errors]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| drc_errors_klayout | ${M[drc_errors_klayout]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| drc_errors_magic | ${M[drc_errors_magic]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| lvs_errors | ${M[lvs_errors]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| antenna_violations | ${M[antenna_violations]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| antenna_violating_nets | ${M[antenna_violating_nets]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| antenna_violating_pins | ${M[antenna_violating_pins]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ir_drop_worst_V | ${M[ir_drop_worst_V]:-} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "### Artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Download artifact bundle](${ARTIFACT_URL})" >> "$GITHUB_STEP_SUMMARY"

  autoflow:
    name: Autoflow (${{ needs.plan.outputs.resolved_variant }})
    if: ${{ needs.plan.outputs.effective_mode == 'auto' }}
    needs: plan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install python deps + volare
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "volare==0.20.6" "pandas" "pyyaml"

      - name: Cache Sky130 PDK
        uses: actions/cache@v4
        with:
          path: ${{ env.PDK_ROOT }}
          key: ${{ runner.os }}-pdk-${{ env.PDK_NAME }}-${{ env.PDK_VERSION }}

      - name: Install Sky130 PDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          volare enable --pdk "${PDK_NAME}" "${PDK_VERSION}" --pdk-root "${PDK_ROOT}"
          test -d "${PDK_ROOT}/sky130A" || (echo "PDK not found at ${PDK_ROOT}/sky130A" && exit 1)

      - name: Pull OpenLane2 container
        run: docker pull "${OPENLANE2_IMAGE}"

      - name: Run auto sweep
        env:
          INPUT_MIN_CLOCK_NS: ${{ inputs.min_clock_ns }}
          INPUT_MAX_CLOCK_NS: ${{ inputs.max_clock_ns }}
          INPUT_INITIAL_STEP_NS: ${{ inputs.initial_step_ns }}
          INPUT_TOLERANCE_NS: ${{ inputs.tolerance_ns }}
          INPUT_MAX_ITERS: ${{ inputs.max_iters }}
          INPUT_SYNTH_STRATEGY: ${{ inputs.synth_strategy }}
          INPUT_RUN_ANTENNA_REPAIR: ${{ inputs.run_antenna_repair }}
          INPUT_RUN_HEURISTIC_DIODE_INSERTION: ${{ inputs.run_heuristic_diode_insertion }}
          INPUT_RUN_POST_GRT_DESIGN_REPAIR: ${{ inputs.run_post_grt_design_repair }}
          INPUT_RUN_POST_GRT_RESIZER_TIMING: ${{ inputs.run_post_grt_resizer_timing }}
          GITHUB_STEP_SUMMARY_PATH: ${{ github.step_summary }}
        run: |
          set -euo pipefail

          MIN_CLOCK_NS="${INPUT_MIN_CLOCK_NS:-5}"
          MAX_CLOCK_NS="${INPUT_MAX_CLOCK_NS:-200}"
          INITIAL_STEP_NS="${INPUT_INITIAL_STEP_NS:-20}"
          TOLERANCE_NS="${INPUT_TOLERANCE_NS:-1}"
          MAX_ITERS="${INPUT_MAX_ITERS:-8}"

          SYNTH_STRATEGY="${INPUT_SYNTH_STRATEGY:-AREA 3}"
          RUN_ANTENNA_REPAIR="${INPUT_RUN_ANTENNA_REPAIR:-true}"
          RUN_HEURISTIC_DIODE_INSERTION="${INPUT_RUN_HEURISTIC_DIODE_INSERTION:-true}"
          RUN_POST_GRT_DESIGN_REPAIR="${INPUT_RUN_POST_GRT_DESIGN_REPAIR:-true}"
          RUN_POST_GRT_RESIZER_TIMING="${INPUT_RUN_POST_GRT_RESIZER_TIMING:-false}"

          python tools/scripts/autoflow.py \
            --variant "${{ needs.plan.outputs.resolved_variant }}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE2_IMAGE}" \
            --start-clock-ns "${{ needs.plan.outputs.resolved_start_clock_ns }}" \
            --min-clock-ns "${MIN_CLOCK_NS}" \
            --max-clock-ns "${MAX_CLOCK_NS}" \
            --initial-step-ns "${INITIAL_STEP_NS}" \
            --tolerance-ns "${TOLERANCE_NS}" \
            --max-iters "${MAX_ITERS}" \
            --synth-strategy "${SYNTH_STRATEGY}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING}" \
            --out-root "ci_out/${{ needs.plan.outputs.resolved_variant }}"

      - name: Show autoflow outputs
        if: always()
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          echo "Listing ci_out:"
          find ci_out -maxdepth 6 -type f 2>/dev/null | sort || true
          echo "Listing repo root:"
          find . -maxdepth 3 -type d | sort | sed -n '1,200p'

      - name: Upload autoflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoflow-${{ needs.plan.outputs.resolved_variant }}
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  compare-runs:
    name: Compare-Runs
    if: ${{ (needs.plan.outputs.effective_mode == 'auto' && needs.autoflow.result == 'success') || (needs.plan.outputs.effective_mode == 'fixed' && needs.run-flow.result == 'success') }}
    needs: [plan, run-flow, autoflow]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pandas" "pyyaml"

      - name: Download all per-run artifacts
        uses: actions/download-artifact@v4
        with:
          path: _collected

      - name: Show downloaded structure
        run: |
          mkdir -p _collected
          find _collected -maxdepth 8 -type f | sort | sed -n '1,400p'

      - name: Build comparison summary, best bundle, and run explorer site
        run: |
          python tools/scripts/compare_runs.py \
            --artifacts-root _collected \
            --summary-md _compare_summary.md \
            --summary-csv _compare_summary.csv \
            --best-json _best_run.json \
            --best-bundle-dir best-layout-bundle \
            --site-dir _site \
            --repo-slug "${{ github.repository }}" \
            --run-id "${{ github.run_id }}"

      - name: Upload comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: compare-summary
          path: |
            _compare_summary.md
            _compare_summary.csv
            _best_run.json
          if-no-files-found: error

      - name: Upload best-layout bundle
        uses: actions/upload-artifact@v4
        with:
          name: best-layout-bundle
          path: best-layout-bundle/
          if-no-files-found: error

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload run explorer site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Workflow Summary
        shell: bash
        run: |
          echo "# ASIC Flow Comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f _compare_summary.md ]; then
            cat _compare_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No comparison summary produced." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-run-explorer:
    name: Summary Run Page
    if: ${{ needs.compare-runs.result == 'success' }}
    needs: compare-runs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Workflow Summary
        shell: bash
        run: |
          echo "# Published Run Explorer" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Open ASIC Flow Run Explorer](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"