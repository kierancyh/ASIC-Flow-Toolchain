name: ASIC Flow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      search_mode:
        description: "Search mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - fixed
      variant:
        description: "Safe variant name such as designs_rns_crt"
        required: false
        default: ""
        type: string
      clock_list:
        description: "Fixed mode only: comma-separated clock list, e.g. 60,40,20"
        required: false
        default: ""
        type: string
      matrix_cap:
        description: "Fixed mode only: maximum number of clock points"
        required: false
        default: "8"
        type: string
      start_clock_ns:
        description: "Auto mode start clock in ns (blank = read from variant.yaml)"
        required: false
        default: ""
        type: string
      min_clock_ns:
        description: "Minimum clock period in ns"
        required: false
        default: "20"
        type: string
      max_clock_ns:
        description: "Maximum clock period in ns"
        required: false
        default: "200"
        type: string
      initial_step_ns:
        description: "Initial coarse sweep step in ns"
        required: false
        default: "20"
        type: string
      tolerance_ns:
        description: "Final stop tolerance in ns"
        required: false
        default: "1"
        type: string
      max_iters:
        description: "Reserved for legacy serial autoflow compatibility"
        required: false
        default: "8"
        type: string
      synth_strategy:
        description: "OpenLane synthesis strategy"
        required: false
        default: "AREA 0"
        type: string
      run_antenna_repair:
        description: "OpenLane RUN_ANTENNA_REPAIR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_heuristic_diode_insertion:
        description: "OpenLane RUN_HEURISTIC_DIODE_INSERTION"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_post_grt_design_repair:
        description: "OpenLane RUN_POST_GRT_DESIGN_REPAIR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_post_grt_resizer_timing:
        description: "OpenLane RUN_POST_GRT_RESIZER_TIMING"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      openlane_image:
        description: "Docker image for OpenLane2"
        required: false
        default: "ghcr.io/efabless/openlane2:2.4.0.dev1"
        type: string
      open_pdks_rev:
        description: "Volare open_pdks revision for sky130"
        required: false
        default: "cd1748bb197f9b7af62a54507de6624e30363943"
        type: string

concurrency:
  group: asic-flow-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      resolved_variant: ${{ steps.resolve.outputs.resolved_variant }}
      effective_mode: ${{ steps.resolve.outputs.effective_mode }}
      start_clock_ns: ${{ steps.start.outputs.start_clock_ns }}
      fixed_matrix_json: ${{ steps.fixed.outputs.fixed_matrix_json }}
      coarse_matrix_json: ${{ steps.coarse.outputs.coarse_matrix_json }}
      min_clock_ns: ${{ steps.sweep.outputs.min_clock_ns }}
      max_clock_ns: ${{ steps.sweep.outputs.max_clock_ns }}
      coarse_step_ns: ${{ steps.sweep.outputs.coarse_step_ns }}
      refine1_step_ns: ${{ steps.sweep.outputs.refine1_step_ns }}
      refine2_step_ns: ${{ steps.sweep.outputs.refine2_step_ns }}
      tolerance_ns: ${{ steps.sweep.outputs.tolerance_ns }}
      openlane_image: ${{ steps.tools.outputs.openlane_image }}
      open_pdks_rev: ${{ steps.tools.outputs.open_pdks_rev }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install plan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Resolve variant and effective mode
        id: resolve
        env:
          INPUT_VARIANT: ${{ github.event.inputs.variant }}
          INPUT_SEARCH_MODE: ${{ github.event.inputs.search_mode }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          manifest = yaml.safe_load(Path("manifest.yaml").read_text(encoding="utf-8")) or {}
          experiments = manifest.get("experiments", []) or []

          requested = os.environ.get("INPUT_VARIANT", "").strip()
          resolved = ""

          if requested:
              for exp in experiments:
                  variant = str(exp.get("variant", "")).strip()
                  safe = variant.replace("/", "_")
                  if requested in (variant, safe):
                      resolved = safe
                      break
              if not resolved:
                  resolved = requested
          else:
              for exp in experiments:
                  if exp.get("enabled", True) and exp.get("variant"):
                      resolved = str(exp["variant"]).replace("/", "_")
                      break

          if not resolved:
              raise SystemExit("No enabled variant found in manifest.yaml")

          selected_mode = os.environ.get("INPUT_SEARCH_MODE", "").strip() or "auto"
          effective_mode = selected_mode if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch" else "auto"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"resolved_variant={resolved}", file=f)
              print(f"effective_mode={effective_mode}", file=f)

          print(f"resolved_variant={resolved}")
          print(f"effective_mode={effective_mode}")
          PY

      - name: Resolve tool versions
        id: tools
        env:
          INPUT_OPENLANE_IMAGE: ${{ github.event.inputs.openlane_image }}
          INPUT_OPEN_PDKS_REV: ${{ github.event.inputs.open_pdks_rev }}
        run: |
          OPENLANE_IMAGE="${INPUT_OPENLANE_IMAGE:-ghcr.io/efabless/openlane2:2.4.0.dev1}"
          OPEN_PDKS_REV="${INPUT_OPEN_PDKS_REV:-cd1748bb197f9b7af62a54507de6624e30363943}"

          {
            echo "openlane_image=${OPENLANE_IMAGE}"
            echo "open_pdks_rev=${OPEN_PDKS_REV}"
          } >> "$GITHUB_OUTPUT"

          echo "openlane_image=${OPENLANE_IMAGE}"
          echo "open_pdks_rev=${OPEN_PDKS_REV}"

      - name: Resolve auto start clock
        id: start
        env:
          EFFECTIVE_MODE: ${{ steps.resolve.outputs.effective_mode }}
          INPUT_START_CLOCK_NS: ${{ github.event.inputs.start_clock_ns }}
          RESOLVED_VARIANT: ${{ steps.resolve.outputs.resolved_variant }}
        run: |
          START_CLOCK_NS=""
          if [ "${EFFECTIVE_MODE}" = "auto" ]; then
            if [ -n "${INPUT_START_CLOCK_NS}" ]; then
              START_CLOCK_NS="${INPUT_START_CLOCK_NS}"
            else
              START_CLOCK_NS="$(python tools/scripts/read_start_clock.py --variant "${RESOLVED_VARIANT}")"
            fi
          fi

          echo "start_clock_ns=${START_CLOCK_NS}" >> "$GITHUB_OUTPUT"
          echo "start_clock_ns=${START_CLOCK_NS}"

      - name: Resolve sweep parameters
        id: sweep
        env:
          INPUT_MIN_CLOCK_NS: ${{ github.event.inputs.min_clock_ns }}
          INPUT_MAX_CLOCK_NS: ${{ github.event.inputs.max_clock_ns }}
          INPUT_INITIAL_STEP_NS: ${{ github.event.inputs.initial_step_ns }}
          INPUT_TOLERANCE_NS: ${{ github.event.inputs.tolerance_ns }}
        run: |
          python - <<'PY'
          import math
          import os

          min_clock = float(os.environ.get("INPUT_MIN_CLOCK_NS", "") or "20")
          max_clock = float(os.environ.get("INPUT_MAX_CLOCK_NS", "") or "200")
          coarse_step = float(os.environ.get("INPUT_INITIAL_STEP_NS", "") or "20")
          tolerance = float(os.environ.get("INPUT_TOLERANCE_NS", "") or "1")

          if min_clock > max_clock:
              raise SystemExit("min_clock_ns must be <= max_clock_ns")
          if coarse_step <= 0:
              raise SystemExit("initial_step_ns must be > 0")
          if tolerance <= 0:
              raise SystemExit("tolerance_ns must be > 0")

          refine1 = max(tolerance, coarse_step / 4.0)
          refine2 = tolerance

          def fmt(v: float) -> str:
              if float(v).is_integer():
                  return str(int(v))
              return str(round(v, 6))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"min_clock_ns={fmt(min_clock)}", file=f)
              print(f"max_clock_ns={fmt(max_clock)}", file=f)
              print(f"coarse_step_ns={fmt(coarse_step)}", file=f)
              print(f"refine1_step_ns={fmt(refine1)}", file=f)
              print(f"refine2_step_ns={fmt(refine2)}", file=f)
              print(f"tolerance_ns={fmt(tolerance)}", file=f)
          PY

      - name: Resolve fixed matrix
        id: fixed
        env:
          EFFECTIVE_MODE: ${{ steps.resolve.outputs.effective_mode }}
          INPUT_CLOCK_LIST: ${{ github.event.inputs.clock_list }}
          INPUT_MATRIX_CAP: ${{ github.event.inputs.matrix_cap }}
          RESOLVED_VARIANT: ${{ steps.resolve.outputs.resolved_variant }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import yaml

          effective_mode = os.environ.get("EFFECTIVE_MODE", "")
          requested = os.environ.get("INPUT_CLOCK_LIST", "").strip()
          matrix_cap = int(os.environ.get("INPUT_MATRIX_CAP", "8") or "8")
          resolved_variant = os.environ.get("RESOLVED_VARIANT", "")

          def safe_variant_to_path(safe_variant: str) -> Path:
              manifest = yaml.safe_load(Path("manifest.yaml").read_text(encoding="utf-8")) or {}
              for exp in manifest.get("experiments", []) or []:
                  variant = str(exp.get("variant", ""))
                  if safe_variant in (variant, variant.replace("/", "_")):
                      return Path(variant)
              candidate = Path(safe_variant)
              if candidate.is_dir() and (candidate / "variant.yaml").exists():
                  return candidate
              raise SystemExit(f"Cannot map variant '{safe_variant}' to a path")

          clocks = []
          if effective_mode == "fixed":
              if requested:
                  for token in requested.split(","):
                      token = token.strip()
                      if token:
                          clocks.append(float(token))
              else:
                  variant_path = safe_variant_to_path(resolved_variant)
                  vcfg = yaml.safe_load((variant_path / "variant.yaml").read_text(encoding="utf-8")) or {}
                  clock_cfg = vcfg.get("clock", {}) or {}
                  sweep = (
                      clock_cfg.get("sweep_ns")
                      or vcfg.get("clock_sweep_ns")
                      or vcfg.get("sweep_ns")
                      or []
                  )
                  if sweep:
                      clocks = [float(x) for x in sweep]
                  else:
                      fallback = (
                          clock_cfg.get("start_ns")
                          or vcfg.get("start_clock_ns")
                          or clock_cfg.get("period")
                          or clock_cfg.get("period_ns")
                      )
                      if fallback not in (None, ""):
                          clocks = [float(fallback)]

          deduped = []
          seen = set()
          for value in clocks:
              key = round(float(value), 6)
              if key not in seen:
                  deduped.append(int(key) if float(key).is_integer() else key)
                  seen.add(key)

          deduped = deduped[:matrix_cap]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"fixed_matrix_json={json.dumps(deduped)}", file=f)

          print(json.dumps(deduped))
          PY

      - name: Resolve coarse auto matrix
        id: coarse
        env:
          EFFECTIVE_MODE: ${{ steps.resolve.outputs.effective_mode }}
          START_CLOCK_NS: ${{ steps.start.outputs.start_clock_ns }}
          MIN_CLOCK_NS: ${{ steps.sweep.outputs.min_clock_ns }}
          MAX_CLOCK_NS: ${{ steps.sweep.outputs.max_clock_ns }}
          COARSE_STEP_NS: ${{ steps.sweep.outputs.coarse_step_ns }}
        run: |
          COARSE_MATRIX_JSON="[]"
          if [ "${EFFECTIVE_MODE}" = "auto" ]; then
            COARSE_MATRIX_JSON="$(python tools/scripts/make_clock_matrix.py \
              --start-clock-ns "${START_CLOCK_NS}" \
              --min-clock-ns "${MIN_CLOCK_NS}" \
              --max-clock-ns "${MAX_CLOCK_NS}" \
              --step-ns "${COARSE_STEP_NS}")"
          fi

          echo "coarse_matrix_json=${COARSE_MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "${COARSE_MATRIX_JSON}"

      - name: Write plan summary
        run: |
          {
            echo "## Plan"
            echo ""
            echo "- Variant: \`${{ steps.resolve.outputs.resolved_variant }}\`"
            echo "- Mode: \`${{ steps.resolve.outputs.effective_mode }}\`"
            echo "- Auto start clock: \`${{ steps.start.outputs.start_clock_ns }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  coarse-sweep:
    needs: plan
    if: ${{ needs.plan.outputs.effective_mode == 'auto' && needs.plan.outputs.coarse_matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        clock_ns: ${{ fromJson(needs.plan.outputs.coarse_matrix_json) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run coarse sweep point
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY:-AREA 3}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Diagnostics
        if: always()
        run: |
          echo "==== coarse ci_out tree ===="
          find ci_out -maxdepth 4 -type f | sort || true
          echo "==== runs tree ===="
          find runs -maxdepth 4 -type f | sort | head -400 || true

      - name: Upload coarse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coarse-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  select-refine-1:
    needs:
      - plan
      - coarse-sweep
    if: ${{ always() && needs.plan.outputs.effective_mode == 'auto' && needs.coarse-sweep.result != 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.select.outputs.matrix_json }}
      done: ${{ steps.select.outputs.done }}
      lowest_pass_ns: ${{ steps.select.outputs.lowest_pass_ns }}
      highest_fail_below_pass_ns: ${{ steps.select.outputs.highest_fail_below_pass_ns }}
      reason: ${{ steps.select.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download coarse artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Select refine-1 matrix
        id: select
        run: |
          python tools/scripts/select_refine_matrix.py \
            --artifacts-root downloaded_artifacts \
            --expand-step-ns "${{ needs.plan.outputs.coarse_step_ns }}" \
            --refine-step-ns "${{ needs.plan.outputs.refine1_step_ns }}" \
            --min-clock-ns "${{ needs.plan.outputs.min_clock_ns }}" \
            --max-clock-ns "${{ needs.plan.outputs.max_clock_ns }}" \
            --tolerance-ns "${{ needs.plan.outputs.tolerance_ns }}" \
            --batch-size 4 \
            --github-output "$GITHUB_OUTPUT"

      - name: Append refine-1 selection summary
        run: |
          {
            echo "## Refine round 1 selection"
            echo ""
            echo "- Lowest pass: \`${{ steps.select.outputs.lowest_pass_ns }}\`"
            echo "- Highest fail below pass: \`${{ steps.select.outputs.highest_fail_below_pass_ns }}\`"
            echo "- Next matrix: \`${{ steps.select.outputs.matrix_json }}\`"
            echo "- Why: ${{ steps.select.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  refine-sweep-1:
    needs:
      - plan
      - select-refine-1
    if: ${{ needs.plan.outputs.effective_mode == 'auto' && needs.select-refine-1.outputs.matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        clock_ns: ${{ fromJson(needs.select-refine-1.outputs.matrix_json) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run refine sweep point 1
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY:-AREA 3}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Diagnostics
        if: always()
        run: |
          echo "==== refine-1 ci_out tree ===="
          find ci_out -maxdepth 4 -type f | sort || true
          echo "==== runs tree ===="
          find runs -maxdepth 4 -type f | sort | head -400 || true

      - name: Upload refine-1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine1-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  select-refine-2:
    needs:
      - plan
      - coarse-sweep
      - refine-sweep-1
    if: ${{ always() && needs.plan.outputs.effective_mode == 'auto' && needs.refine-sweep-1.result != 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.select.outputs.matrix_json }}
      done: ${{ steps.select.outputs.done }}
      lowest_pass_ns: ${{ steps.select.outputs.lowest_pass_ns }}
      highest_fail_below_pass_ns: ${{ steps.select.outputs.highest_fail_below_pass_ns }}
      reason: ${{ steps.select.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download accumulated artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Select refine-2 matrix
        id: select
        run: |
          python tools/scripts/select_refine_matrix.py \
            --artifacts-root downloaded_artifacts \
            --expand-step-ns "${{ needs.plan.outputs.refine1_step_ns }}" \
            --refine-step-ns "${{ needs.plan.outputs.refine2_step_ns }}" \
            --min-clock-ns "${{ needs.plan.outputs.min_clock_ns }}" \
            --max-clock-ns "${{ needs.plan.outputs.max_clock_ns }}" \
            --tolerance-ns "${{ needs.plan.outputs.tolerance_ns }}" \
            --batch-size 6 \
            --github-output "$GITHUB_OUTPUT"

      - name: Append refine-2 selection summary
        run: |
          {
            echo "## Refine round 2 selection"
            echo ""
            echo "- Lowest pass: \`${{ steps.select.outputs.lowest_pass_ns }}\`"
            echo "- Highest fail below pass: \`${{ steps.select.outputs.highest_fail_below_pass_ns }}\`"
            echo "- Next matrix: \`${{ steps.select.outputs.matrix_json }}\`"
            echo "- Why: ${{ steps.select.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  refine-sweep-2:
    needs:
      - plan
      - select-refine-2
    if: ${{ needs.plan.outputs.effective_mode == 'auto' && needs.select-refine-2.outputs.matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        clock_ns: ${{ fromJson(needs.select-refine-2.outputs.matrix_json) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run refine sweep point 2
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY:-AREA 3}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Diagnostics
        if: always()
        run: |
          echo "==== refine-2 ci_out tree ===="
          find ci_out -maxdepth 4 -type f | sort || true
          echo "==== runs tree ===="
          find runs -maxdepth 4 -type f | sort | head -400 || true

      - name: Upload refine-2 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine2-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  run-flow:
    needs: plan
    if: ${{ needs.plan.outputs.effective_mode == 'fixed' && needs.plan.outputs.fixed_matrix_json != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        clock_ns: ${{ fromJson(needs.plan.outputs.fixed_matrix_json) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install volare pyyaml

      - name: Restore PDK cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.volare
          key: ${{ runner.os }}-sky130-volare-${{ needs.plan.outputs.open_pdks_rev }}
          restore-keys: |
            ${{ runner.os }}-sky130-volare-

      - name: Install Sky130 PDK with Volare
        env:
          PDK_ROOT: ${{ github.workspace }}/.volare
          OPEN_PDKS_REV: ${{ needs.plan.outputs.open_pdks_rev }}
        run: |
          mkdir -p "${PDK_ROOT}"
          volare enable --pdk sky130 "${OPEN_PDKS_REV}"

      - name: Pull OpenLane image
        env:
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
        run: |
          docker pull "${OPENLANE_IMAGE}"

      - name: Run fixed single-point flow
        env:
          VARIANT: ${{ needs.plan.outputs.resolved_variant }}
          OPENLANE_IMAGE: ${{ needs.plan.outputs.openlane_image }}
          SYNTH_STRATEGY: ${{ github.event.inputs.synth_strategy }}
          RUN_ANTENNA_REPAIR: ${{ github.event.inputs.run_antenna_repair }}
          RUN_HEURISTIC_DIODE_INSERTION: ${{ github.event.inputs.run_heuristic_diode_insertion }}
          RUN_POST_GRT_DESIGN_REPAIR: ${{ github.event.inputs.run_post_grt_design_repair }}
          RUN_POST_GRT_RESIZER_TIMING: ${{ github.event.inputs.run_post_grt_resizer_timing }}
          PDK_ROOT: ${{ github.workspace }}/.volare
          CLOCK_NS: ${{ matrix.clock_ns }}
        run: |
          python tools/scripts/autoflow.py \
            --variant "${VARIANT}" \
            --pdk-root "${PDK_ROOT}" \
            --openlane-image "${OPENLANE_IMAGE}" \
            --start-clock-ns "${CLOCK_NS}" \
            --min-clock-ns "${CLOCK_NS}" \
            --max-clock-ns "${CLOCK_NS}" \
            --initial-step-ns "1" \
            --tolerance-ns "0.000001" \
            --max-iters "1" \
            --synth-strategy "${SYNTH_STRATEGY:-AREA 3}" \
            --run-antenna-repair "${RUN_ANTENNA_REPAIR:-true}" \
            --run-heuristic-diode-insertion "${RUN_HEURISTIC_DIODE_INSERTION:-true}" \
            --run-post-grt-design-repair "${RUN_POST_GRT_DESIGN_REPAIR:-true}" \
            --run-post-grt-resizer-timing "${RUN_POST_GRT_RESIZER_TIMING:-false}" \
            --out-root "ci_out/${VARIANT}"

      - name: Diagnostics
        if: always()
        run: |
          echo "==== fixed ci_out tree ===="
          find ci_out -maxdepth 4 -type f | sort || true
          echo "==== runs tree ===="
          find runs -maxdepth 4 -type f | sort | head -400 || true

      - name: Upload fixed-flow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixed-${{ needs.plan.outputs.resolved_variant }}-${{ matrix.clock_ns }}ns
          path: ci_out/${{ needs.plan.outputs.resolved_variant }}/
          if-no-files-found: error
          include-hidden-files: true

  compare-runs:
    needs:
      - plan
      - coarse-sweep
      - refine-sweep-1
      - refine-sweep-2
      - run-flow
    if: ${{ always() && (needs.coarse-sweep.result != 'skipped' || needs.refine-sweep-1.result != 'skipped' || needs.refine-sweep-2.result != 'skipped' || needs.run-flow.result != 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all upstream artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Diagnostics
        run: |
          echo "==== downloaded_artifacts tree ===="
          find downloaded_artifacts -maxdepth 6 -type f | sort || true
          COUNT="$(find downloaded_artifacts -type f -name metrics.csv | wc -l | tr -d ' ')"
          echo "metrics_csv_count=${COUNT}" >> "$GITHUB_ENV"
          echo "Found ${COUNT} metrics.csv files"

      - name: Fail if no metrics were downloaded
        run: |
          test "${metrics_csv_count}" != "0"

      - name: Compare runs and build explorer
        run: |
          python tools/scripts/compare_runs.py \
            --artifacts-root downloaded_artifacts \
            --summary-md _compare_summary.md \
            --summary-csv _compare_summary.csv \
            --best-json _best_run.json \
            --best-bundle-dir best-layout-bundle \
            --site-dir _site \
            --repo-slug "${{ github.repository }}" \
            --run-id "${{ github.run_id }}"

      - name: Append compare summary
        if: always()
        run: |
          test -f _compare_summary.md && cat _compare_summary.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload compare summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compare-summary
          path: |
            _compare_summary.md
            _compare_summary.csv
            _best_run.json
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload best-layout bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: best-layout-bundle
          path: best-layout-bundle/
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload run explorer site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-explorer-site
          path: _site/
          if-no-files-found: error
          include-hidden-files: true

  deploy-run-explorer:
    needs: compare-runs
    if: ${{ needs.compare-runs.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download run explorer artifact
        uses: actions/download-artifact@v4
        with:
          name: run-explorer-site
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4