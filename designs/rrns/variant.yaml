name: rrns
top_module: rrns_top
pdk: sky130A
clock:
  port: clk
  mode: auto        # auto | fixed
  fixed_ns: 101.0
  search:
    min_ns: 5.0
    max_ns: 200.0
    strategy: binary # binary | sweep
    sweep_ns: [200, 150, 120, 101, 80, 60, 40, 30, 20, 17, 15, 12, 10]
sources:
  - src/**/*.v
tests:
  enabled: false
